<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPES | Medical Primary Emergency System</title>
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Resets */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg-color); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        a { text-decoration: none; color: inherit; }
        
        /* Navbar */
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 16px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: var(--shadow-sm); border-bottom: 1px solid var(--input-border); }
        [data-theme="dark"] .navbar { background: rgba(26, 32, 44, 0.9); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-link { font-weight: 600; font-size: 0.95rem; color: var(--text-secondary); transition: color 0.2s; }
        .nav-link:hover { color: var(--primary-color); }
        .nav-actions { display: flex; gap: 12px; align-items: center; }
        
        /* Buttons */
        .btn { padding: 10px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary-color); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .btn-outline { border: 2px solid var(--primary-color); color: var(--primary-color); background: transparent; }
        .btn-outline:hover { background: var(--primary-color); color: #fff; }
        .btn-danger { background: #e53e3e; color: #fff; }
        .btn-danger:hover { background: #c53030; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(229,62,62,0.3); }

        /* Hero Section */
        .hero { padding: 140px 5% 80px; min-height: 90vh; display: flex; align-items: center; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; top: -10%; right: -5%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(43,108,176,0.1) 0%, transparent 70%); border-radius: 50%; z-index: 0; }
        [data-theme="colorblind"] .hero::before { background: radial-gradient(circle, rgba(237,137,54,0.15) 0%, transparent 70%); }
        
        .hero-content { flex: 1; position: relative; z-index: 1; max-width: 600px; }
        .hero-title { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 20px; color: var(--text-primary); }
        .hero-title span { color: var(--primary-color); }
        .hero-subtitle { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 32px; max-width: 500px; }
        .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
        
        .hero-image { flex: 1; display: flex; justify-content: center; position: relative; z-index: 1; }
        .hero-image img { max-width: 100%; height: auto; border-radius: 20px; box-shadow: var(--shadow-lg); animation: float 6s ease-in-out infinite; border: 4px solid var(--card-bg); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Stats Strip */
        .stats-strip { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; padding: 40px 5%; background: var(--primary-color); color: #fff; }
        [data-theme="colorblind"] .stats-strip { background: var(--text-primary); }
        .stat-item { text-align: center; }
        .stat-item h3 { font-size: 2.5rem; font-weight: 800; margin-bottom: 4px; }
        .stat-item p { font-size: 0.9rem; opacity: 0.8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* Features Section */
        .features { padding: 80px 5%; background: var(--bg-color); }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 2.2rem; margin-bottom: 12px; }
        .section-header p { color: var(--text-secondary); max-width: 600px; margin: 0 auto; }
        
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .feature-card { background: var(--card-bg); border: 1px solid var(--input-border); border-radius: 16px; padding: 32px; transition: transform 0.3s, box-shadow 0.3s; }
        .feature-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-md); border-color: var(--primary-color); }
        .feature-icon { width: 60px; height: 60px; border-radius: 14px; background: rgba(43,108,176,0.1); color: var(--primary-color); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-bottom: 20px; }
        .feature-card.urgent .feature-icon { background: rgba(229,62,62,0.1); color: #e53e3e; }
        .feature-card h3 { font-size: 1.3rem; margin-bottom: 10px; }
        .feature-card p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 20px; }
        .feature-link { color: var(--primary-color); font-weight: 700; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px; }
        .feature-link:hover { text-decoration: underline; }
