<script>
const html=document.documentElement;
const saved=localStorage.getItem('mpes-theme')||'light';
html.setAttribute('data-theme',saved);
document.querySelectorAll('.theme-btn').forEach(btn=>{
    if(btn.dataset.setTheme===saved)btn.classList.add('active');
    btn.addEventListener('click',()=>{
        const t=btn.dataset.setTheme;
        html.setAttribute('data-theme',t);
        localStorage.setItem('mpes-theme',t);
        document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
    });
});
const sidebar=document.getElementById('sidebar'),mainWrapper=document.getElementById('mainWrapper');
document.getElementById('sidebarToggle').addEventListener('click',()=>{
    if(window.innerWidth<=768)sidebar.classList.toggle('mobile-open');
    else{sidebar.classList.toggle('collapsed');mainWrapper.classList.toggle('sidebar-collapsed');}
});
document.querySelectorAll('.rx-preview-overlay').forEach(o=>{
    o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});
document.querySelectorAll('.counter').forEach(el=>{
    const target=+el.dataset.target;let count=0;
    const step=Math.ceil(target/20);
    const iv=setInterval(()=>{count+=step;if(count>=target){count=target;clearInterval(iv);}el.textContent=count;},50);
});

const RX_DATA=[
    {id:'RX-1048',doctor:'Dr. Sarah Ahmed',spec:'Cardiologist',hospital:'City Hospital',date:'May 15, 2026',status:'active',img:'https://i.pravatar.cc/48?img=47',
     drugs:[{name:'Paracetamol 500mg',dose:'2x daily after meal',days:'7 days'},{name:'Amoxicillin 250mg',dose:'3x daily',days:'5 days'},{name:'Omeprazole 20mg',dose:'1x before breakfast',days:'7 days'}],
     notes:'Rest well, drink plenty of water. Avoid spicy food.'},
    {id:'RX-1042',doctor:'Dr. Karim Hossain',spec:'Neurologist',hospital:'Apollo Hospital',date:'Apr 28, 2026',status:'active',img:'https://i.pravatar.cc/48?img=12',
     drugs:[{name:'Aspirin 75mg',dose:'1x daily',days:'30 days'},{name:'Atorvastatin 10mg',dose:'1x at night',days:'30 days'}],
     notes:'Monitor blood pressure daily. Avoid strenuous activity.'},
    {id:'RX-1036',doctor:'Dr. Priya Singh',spec:'Orthopedic',hospital:'Metro Medical',date:'Apr 10, 2026',status:'active',img:'https://i.pravatar.cc/48?img=44',
     drugs:[{name:'Ibuprofen 400mg',dose:'3x daily with food',days:'5 days'},{name:'Calcium + D3',dose:'1x daily',days:'60 days'}],
     notes:'Physiotherapy sessions recommended. Avoid heavy lifting.'},
    {id:'RX-1028',doctor:'Dr. Rahman Khan',spec:'General Physician',hospital:'LifeCare Clinic',date:'Mar 22, 2026',status:'completed',img:'https://i.pravatar.cc/48?img=33',
     drugs:[{name:'Cetirizine 10mg',dose:'1x at night',days:'7 days'},{name:'Pseudoephedrine 60mg',dose:'2x daily',days:'5 days'}],
     notes:'Avoid dust and allergens. Follow-up if symptoms persist.'},
    {id:'RX-1019',doctor:'Dr. Nadia Islam',spec:'Dermatologist',hospital:'City Hospital',date:'Feb 14, 2026',status:'expired',img:'https://i.pravatar.cc/48?img=48',
     drugs:[{name:'Clindamycin Gel 1%',dose:'Apply twice on affected area',days:'14 days'},{name:'Doxycycline 100mg',dose:'1x daily',days:'14 days'}],
     notes:'Use sunscreen SPF 30+. Avoid harsh soaps.'},
];

const statusMap={active:'success',completed:'info',expired:'danger'};

function renderRx(list){
    const container=document.getElementById('rxList');
    if(!list.length){container.innerHTML=`<div class="empty-state"><i class="fa-solid fa-file-medical"></i><p>No prescriptions found.</p></div>`;return;}
    container.innerHTML=list.map(rx=>`
        <div class="rx-card-full ${rx.status==='expired'?'expired':''}">
            <div class="rx-header">
                <img src="${rx.img}" class="rx-doc-img" alt="${rx.doctor}">
                <div class="rx-doc-info">
                    <h4>${rx.doctor} <span class="badge-pill ${statusMap[rx.status]}" style="margin-left:8px;">${rx.status.charAt(0).toUpperCase()+rx.status.slice(1)}</span></h4>
                    <p>${rx.spec} &nbsp;·&nbsp; ${rx.hospital}</p>
                </div>
                <div style="text-align:right;font-size:.8rem;color:var(--text-secondary);">
                    <div><strong>${rx.id}</strong></div>
                    <div>${rx.date}</div>
                </div>
            </div>
            <div class="rx-drugs-grid">
                ${rx.drugs.map(d=>`<div class="drug-chip"><div class="drug-name"><i class="fa-solid fa-capsules" style="color:var(--primary-color);margin-right:6px;"></i>${d.name}</div><div class="drug-dose">${d.dose} · ${d.days}</div></div>`).join('')}
            </div>
            <div class="rx-footer">
                <span style="font-size:.82rem;color:var(--text-secondary);"><i class="fa-solid fa-note-sticky"></i> ${rx.notes}</span>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-outline btn-sm" onclick="previewRx('${rx.id}')"><i class="fa-solid fa-eye"></i> View</button>
                    <button class="btn btn-primary btn-sm" onclick="previewRx('${rx.id}')"><i class="fa-solid fa-download"></i> Download</button>
                    ${rx.status==='expired'?`<button class="btn btn-outline btn-sm" style="border-color:#e53e3e;color:#e53e3e;"><i class="fa-solid fa-rotate-right"></i> Refill</button>`:''}
                </div>
            </div>
        </div>`).join('');
}

function filterRx(){
    const q=document.getElementById('rxSearch').value.toLowerCase();
    const st=document.getElementById('rxStatusFilter').value;
    const sort=document.getElementById('rxSortFilter').value;
    let list=RX_DATA.filter(rx=>{
        const matchQ=!q||rx.doctor.toLowerCase().includes(q)||rx.drugs.some(d=>d.name.toLowerCase().includes(q));
        const matchSt=!st||rx.status===st;
        return matchQ&&matchSt;
    });
    if(sort==='oldest')list=list.reverse();
    renderRx(list);
}

['rxSearch','rxStatusFilter','rxSortFilter'].forEach(id=>document.getElementById(id).addEventListener('input',filterRx));

function previewRx(id){
    const rx=RX_DATA.find(r=>r.id===id);if(!rx)return;
    document.getElementById('previewRxId').textContent='Rx #'+rx.id;
    document.getElementById('previewDate').textContent=rx.date;
    document.getElementById('previewDocImg').src=rx.img;
    document.getElementById('previewDocName').textContent=rx.doctor;
    document.getElementById('previewSpec').textContent=rx.spec+' · '+rx.hospital;
    document.getElementById('previewNotes').textContent=rx.notes;
    document.getElementById('previewDrugs').innerHTML=rx.drugs.map(d=>`
        <div class="rx-drug-row">
            <div><strong>${d.name}</strong><div style="font-size:.8rem;color:var(--text-secondary);">${d.dose}</div></div>
            <span class="badge-pill info">${d.days}</span>
        </div>`).join('');
    document.getElementById('rxPreviewModal').classList.add('open');
}

renderRx(RX_DATA);
</script>
